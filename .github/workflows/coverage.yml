name: Coverage

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.0'

    - name: Setup R dependencies
      run: |
        sudo apt-get update
        # libuv1-dev: the 'fs' package (a transitive dependency of
        # devtools/testthat/covr) now builds against system libuv; without it
        # fs fails to compile and cascades to every package that depends on it.
        sudo apt-get install -y gfortran liblapack-dev libblas-dev \
          libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev \
          libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
          libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
          libuv1-dev

    - name: Install R packages
      run: |
        # Ensure the library directory exists and is writable
        mkdir -p $R_LIBS_USER
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); install.packages(c('Rcpp', 'RcppArmadillo', 'devtools', 'testthat', 'covr', 'remotes'), repos='https://cran.rstudio.com', lib=Sys.getenv('R_LIBS_USER'))"
        # Install R package dependencies from DESCRIPTION file
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); remotes::install_deps('R-package', dependencies=TRUE, repos='https://cran.rstudio.com')"

    - name: Install RInside (optional for coverage)
      # Same conditional-token rationale as ci-hosted.yml: keep the authenticated
      # API rate limit on trusted runs, but withhold the token on fork PRs (this
      # workflow also triggers on pull_request). '' only for fork PRs.
      env:
        GITHUB_PAT: ${{ github.event.pull_request.head.repo.fork == true && '' || secrets.GITHUB_TOKEN }}
      run: |
        # Try to install RInside, but don't fail if it doesn't work
        Rscript -e "
        tryCatch({
          remotes::install_github('eddelbuettel/RInside', upgrade='never', quiet=TRUE)
          cat('RInside installed\n')
        }, error = function(e) {
          cat('RInside installation failed, proceeding without it\n')
        })"

    - name: Build C++ library (optional)
      run: |
        make clean
        # Try to build C++ library, but don't fail if RInside is missing
        if Rscript -e "library(RInside)" 2>/dev/null; then
          echo "Building C++ library"
          make
        else
          echo "Skipping C++ build, focusing on R package coverage"
        fi

    - name: Generate coverage report
      run: |
        cd R-package
        # Document and build first, then generate coverage
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); devtools::document()"
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); covr::codecov()"
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}