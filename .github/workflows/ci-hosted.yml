name: CI (hosted)

# The GitHub-hosted half of the CI split (see ci-selfhosted.yml for the other
# half and the security rationale). This is where pull requests — including
# fork PRs from external contributors — run: hosted runners are free on a
# public repo and isolate untrusted PR code away from the self-hosted runner.
#
# Trigger split:
#   * pull_request        -> full matrix (ubuntu + macos) for PR feedback
#   * push master/develop -> macOS ONLY. Linux pushes build on the self-hosted
#     runner (ci-selfhosted.yml); macOS cannot move there, so it keeps running
#     here on push to preserve the coverage the old ci.yml had.
#
# ccache + actions/cache speed up the C++-heavy R package compiles between
# runs (compiler calls are routed through ccache via ~/.R/Makevars).

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-and-test:
    # On push, the ubuntu build belongs to the self-hosted workflow — only
    # macOS runs here (see header). On pull_request, both run.
    if: github.event_name == 'pull_request' || matrix.os == 'macos-latest'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        r-version: ['4.3.0']

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for symbolic links

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ matrix.r-version }}

    - name: Setup R dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        # libuv1-dev: the 'fs' package (a transitive dependency of
        # devtools/testthat/covr) now builds against system libuv; without it
        # fs fails to compile and cascades to every package that depends on it.
        sudo apt-get install -y gfortran liblapack-dev libblas-dev \
          libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev \
          libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
          libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
          libuv1-dev ccache

    - name: Setup R dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # Install gfortran for RcppArmadillo
        brew install gfortran || true
        brew install ccache || true
        # Ensure R can find gfortran
        sudo ln -sf /opt/homebrew/bin/gfortran /usr/local/bin/gfortran || true

    - name: Restore compiler cache (ccache)
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ matrix.os }}-r${{ matrix.r-version }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ matrix.os }}-r${{ matrix.r-version }}-

    - name: Route R compiles through ccache
      run: |
        mkdir -p "$CCACHE_DIR" ~/.R
        # Wrap whatever compilers this R was configured with, rather than
        # hardcoding gcc/clang names that differ across the matrix.
        {
          echo "CC=ccache $(R CMD config CC)"
          echo "CXX=ccache $(R CMD config CXX)"
          echo "CXX11=ccache $(R CMD config CXX11)"
          echo "CXX14=ccache $(R CMD config CXX14)"
          echo "CXX17=ccache $(R CMD config CXX17)"
        } >> ~/.R/Makevars
        ccache -z
      shell: bash

    - name: Install R packages
      run: |
        # Ensure the library directory exists and is writable
        mkdir -p $R_LIBS_USER
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); install.packages(c('Rcpp', 'RcppArmadillo', 'devtools', 'testthat', 'remotes'), repos='https://cran.rstudio.com', lib=Sys.getenv('R_LIBS_USER'))"
        # Install R package dependencies from DESCRIPTION file
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); remotes::install_deps('R-package', dependencies=TRUE, repos='https://cran.rstudio.com')"
      shell: bash

    - name: Install RInside (with fallback)
      env:
        GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Try to install RInside from GitHub, fallback to CRAN if available, or skip
        Rscript -e "
        tryCatch({
          remotes::install_github('eddelbuettel/RInside', upgrade='never', quiet=TRUE)
          cat('RInside installed from GitHub\n')
        }, error = function(e) {
          tryCatch({
            install.packages('RInside', repos='https://cran.rstudio.com', quiet=TRUE)
            cat('RInside installed from CRAN\n')
          }, error = function(e2) {
            cat('RInside installation failed, will use NORINSIDE flag\n')
            cat('Error:', conditionMessage(e2), '\n')
          })
        })"
      shell: bash

    - name: Build C++ library
      run: |
        make clean
        # Check if RInside is available, if not, skip C++ build and focus on R package
        if Rscript -e "library(RInside)" 2>/dev/null; then
          echo "RInside available, building C++ library"
          make
        else
          echo "RInside not available, skipping C++ standalone build"
          echo "Will focus on R package build which uses NORINSIDE flag"
        fi

    - name: Run C++ tests
      run: |
        # Only run C++ tests if the binary was built
        if [ -f "bin/tests" ]; then
          echo "Running C++ tests"
          # Set LD_LIBRARY_PATH to find R shared libraries
          export LD_LIBRARY_PATH="$(R RHOME)/lib:${LD_LIBRARY_PATH}"
          bin/tests
        else
          echo "C++ tests not available (RInside not installed)"
        fi

    - name: Build and check R package
      run: |
        cd R-package
        # Use devtools directly instead of make (which uses --vanilla flag that ignores R_LIBS_USER)
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); devtools::document()"
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); devtools::check()"

    - name: Install R package
      run: |
        cd R-package
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); devtools::install()"

    - name: Run R tests
      run: |
        cd R-package
        Rscript -e ".libPaths(Sys.getenv('R_LIBS_USER')); devtools::test()"

    - name: ccache stats
      if: always()
      run: ccache -s || true
